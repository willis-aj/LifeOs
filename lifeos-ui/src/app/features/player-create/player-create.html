<h2 mat-dialog-title>New player</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="name-field">
    <mat-label>Player name</mat-label>
    <input
      matInput
      [(ngModel)]="name"
      (keyup.enter)="submit()"
      placeholder="e.g. Abigayle"
    />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!name.trim()" (click)="submit()">Create</button>
</mat-dialog-actions>
