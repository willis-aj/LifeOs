<h2 mat-dialog-title>{{ isEdit ? 'Edit goal' : 'Add goal' }}</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    @if (!isEdit) {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="2"></textarea>
      </mat-form-field>
    }

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Base XP per task</mat-label>
      <input matInput type="number" formControlName="base_xp_per_task" min="1" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Milestones (XP, comma-separated)</mat-label>
      <input matInput formControlName="milestones" placeholder="e.g. 100, 250, 500" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      {{ isEdit ? 'Save' : 'Add' }}
    </button>
  </mat-dialog-actions>
</form>
