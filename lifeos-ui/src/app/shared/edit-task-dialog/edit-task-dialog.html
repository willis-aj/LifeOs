<h2 mat-dialog-title>Edit task</h2>

<mat-dialog-content class="form-content">
  <mat-form-field appearance="outline">
    <mat-label>Task name</mat-label>
    <input matInput [(ngModel)]="label" name="label" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Duration (minutes)</mat-label>
    <input matInput type="number" min="1" [(ngModel)]="durationMinutes" name="duration" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Hour (0-23)</mat-label>
    <input matInput type="number" min="0" max="23" [(ngModel)]="hour" name="hour" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>XP</mat-label>
    <input matInput type="number" min="1" [(ngModel)]="xp" name="xp" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Goal</mat-label>
    <mat-select [(ngModel)]="goalId" name="goal">
      @for (goal of goals(); track goal.id) {
        <mat-option [value]="goal.id">{{ goal.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()">Save</button>
</mat-dialog-actions>
