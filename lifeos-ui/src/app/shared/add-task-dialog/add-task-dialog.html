<h2 mat-dialog-title>Add a manual task</h2>

<mat-dialog-content class="form-content">
  <mat-form-field appearance="outline">
    <mat-label>Task name</mat-label>
    <input matInput [(ngModel)]="label" name="label" placeholder="e.g. Pay bills" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Duration (minutes)</mat-label>
    <input matInput type="number" min="1" [(ngModel)]="durationMinutes" name="duration" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Hour (optional - defaults to now)</mat-label>
    <mat-select [(ngModel)]="hour" name="hour">
      <mat-option [value]="null">Now</mat-option>
      @for (h of hours; track h) {
        <mat-option [value]="h">{{ formatHour(h) }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Goal</mat-label>
    <mat-select [(ngModel)]="goalId" name="goal">
      @for (goal of goals(); track goal.id) {
        <mat-option [value]="goal.id">{{ goal.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!label.trim()" (click)="submit()">Add task</button>
</mat-dialog-actions>
